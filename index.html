<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KelbyOne - The Grid</title>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
.container { text-align: center; max-width: 500px; padding: 2rem; }
h1 { font-size: 2.5rem; font-weight: 900; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: -0.02em; }
h1 span { color: #f5a623; }
.subtitle { color: #888; font-size: 0.95rem; margin-bottom: 2.5rem; }
.links { display: flex; flex-direction: column; gap: 1rem; }
.links a { display: block; padding: 1.2rem 2rem; border-radius: 10px; text-decoration: none; font-size: 1.1rem; font-weight: 700; transition: transform 0.2s, box-shadow 0.2s; }
.links a:hover { transform: translateY(-2px); }
.link-critique { background: linear-gradient(135deg, #f5a623, #e8932a); color: #000; }
.link-critique:hover { box-shadow: 0 8px 30px rgba(245,166,35,0.3); }
.link-edit { background: linear-gradient(135deg, #4fc3f7, #29b6f6); color: #000; }
.link-edit:hover { box-shadow: 0 8px 30px rgba(79,195,247,0.3); }
.link-contest { background: #1e1e1e; color: #f5f5f5; border: 1px solid #333; }
.link-contest:hover { box-shadow: 0 8px 30px rgba(255,255,255,0.05); background: #252525; }
.footer { margin-top: 3rem; font-size: 0.8rem; color: #444; }
.footer a { color: #666; text-decoration: none; }
.footer a:hover { color: #f5a623; }
</style>
</head>
<body>
<div class="container">
<h1>The <span>Grid</span></h1>
<p class="subtitle">Submit your photos for the show</p>
<div class="links">
  <a href="/gridphotos/" class="link-critique">📷 Blind Photo Critique Submission</a>
  <a href="/gridedit/" class="link-edit">🎨 How Would I Edit Your Photo</a>
  <a href="/gridcontest/" class="link-contest">🎁 Live Contest Entry</a>
</div>
<div class="footer">
  <a href="https://kelbyone.com">kelbyone.com</a> · <a href="https://youtube.com/kelbyone">YouTube</a>
</div>
</div>
</body>
</html>
